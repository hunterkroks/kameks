services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-kameks_db}
      POSTGRES_USER: ${DB_USER:-kameks_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kameks_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-kameks_user} -d ${DB_NAME:-kameks_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --settings=kameks.settings.production &&
             python manage.py populate_catalog --settings=kameks.settings.production &&
             python manage.py collectstatic --noinput --clear --settings=kameks.settings.production &&
             gunicorn kameks.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env
    environment:
      DB_HOST: db
      DJANGO_SETTINGS_MODULE: kameks.settings.production
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
  media_volume:
